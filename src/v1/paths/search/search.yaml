/search/accounts:
  get:
    summary: Search for accounts
    description: Search for accounts
    operationId: searchAccounts
    tags:
      - search
    parameters:
      _tpl_correlationParameter,3:
      _tpl_limitParameter,3:
      _tpl_pageParameter,3:
      - in: query
        name: query
        description: The query you wish to search for.
        required: true
        schema:
          type: string
          example: "checking"
      - in: query
        name: type
        description: The type of accounts you wish to limit the search to.
        required: false
        schema:
          $ref: '#/components/schemas/AccountTypeFilter'
      - in: query
        name: field
        description: The account field(s) you want to search in.
        required: true
        schema:
          $ref: '#/components/schemas/AccountSearchFieldFilter'
    responses:
      "200":
        description: A list of accounts.
        content:
          application/vnd.api+json:
            schema:
              $ref: '#/components/schemas/AccountArray'
      _tpl_unauthenticatedResponse,3:
      _tpl_notFoundResponse,3:
      _tpl_badRequestResponse,3:
      _tpl_internalExceptionResponse,3:
/search/transactions:
  get:
    summary: Search for transactions
    description: Searches through the users transactions.
    externalDocs:
      description: Search Documentation
      url: https://docs.firefly-iii.org/how-to/firefly-iii/features/search/
    operationId: searchTransactions
    tags:
      - search
    parameters:
      _tpl_correlationParameter,3:
      _tpl_limitParameter,3:
      _tpl_pageParameter,3:
      - in: query
        name: query
        description: The query you wish to search for.
        required: true
        schema:
          type: string
          example: "groceries"

    responses:
      "200":
        description: A list of transactions.
        content:
          application/vnd.api+json:
            schema:
              $ref: '#/components/schemas/TransactionArray'
      _tpl_unauthenticatedResponse,3:
      _tpl_notFoundResponse,3:
      _tpl_badRequestResponse,3:
      _tpl_internalExceptionResponse,3:
/search/transactions/count:
  get:
    summary: Count transactions matching the given filters.
    description: |
      Returns the number of transactions that match the given meta-field filters. This is useful to check for
      existing transactions (for example to avoid duplicates) before storing new data.
    operationId: countTransactions
    tags:
      - search
    parameters:
      _tpl_correlationParameter,3:
      - in: query
        name: external_identifier
        description: Count transactions with this exact external identifier.
        required: false
        schema:
          type: string
          example: "abcd-1234"
      - in: query
        name: internal_reference
        description: Count transactions with this exact internal reference.
        required: false
        schema:
          type: string
          example: "INV-998"
      - in: query
        name: notes
        description: Count transactions whose notes contain this string.
        required: false
        schema:
          type: string
          example: "groceries"
      - in: query
        name: description
        description: Count transactions with this exact description.
        required: false
        schema:
          type: string
          example: "Monthly rent"
      - in: query
        name: include_deleted
        description: Whether to include soft-deleted transactions in the count.
        required: false
        schema:
          type: boolean
          example: false
    responses:
      "200":
        description: The number of matching transactions.
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  example: 42
      _tpl_unauthenticatedResponse,3:
      _tpl_notFoundResponse,3:
      _tpl_badRequestResponse,3:
      _tpl_internalExceptionResponse,3:
